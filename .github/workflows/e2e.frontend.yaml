name: e2e:frontend
on:
  pull_request:
    # paths:
    #   - 'frontend/**'
# If two events are triggered within a short time in the same PR, cancel the run of the oldest event
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - enterprise/feature.spec.ts
          - enterprise/groups.spec.ts
          - enterprise/projects/access.spec.ts
          - oss/segments/segments.spec.ts
          - oss/feature/feature.spec.ts
          # - oss/login/login.spec.ts
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "$GITHUB_CONTEXT"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache frontend build
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/build
          key: frontend-build-${{ runner.os }}-${{ hashFiles('frontend/yarn.lock', 'frontend/src/**', 'frontend/public/**', 'frontend/index.html', 'frontend/vite.config.mts') }}
      - name: Build static frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          yarn install --immutable
          yarn build
      - name: Start Unleash test instance
        run: |
          docker compose -f .github/docker-compose.test.yml up -d --wait -t 90
        env:
          FRONTEND_TEST_LICENSE: ${{ secrets.FRONTEND_TEST_LICENSE }}
      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          env: AUTH_USER=admin,AUTH_PASSWORD=unleash4all
          config: baseUrl=http://localhost:3000
          spec: cypress/${{ matrix.test }}
          install-command: yarn --immutable
      - name: Set artifact name
        if: always()
        id: artifact-name
        run: echo "name=cypress-screenshots-$(echo '${{ matrix.test }}' | tr '/' '-')" >> $GITHUB_OUTPUT
      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: frontend/cypress/screenshots
          if-no-files-found: ignore
