name: e2e:frontend
on:
  pull_request:
    # paths:
    #   - 'frontend/**'
# If two events are triggered within a short time in the same PR, cancel the run of the oldest event
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Cache Cypress binary
        id: cache-cypress
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build static frontend
        run: pnpm --dir frontend build
      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  e2e:
    needs: e2e-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - enterprise/feature.spec.ts
          - enterprise/groups.spec.ts
          - enterprise/projects/access.spec.ts
          - oss/segments/segments.spec.ts
          - oss/feature/feature.spec.ts
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/build
      - name: Restore Cypress binary
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start Unleash test instance
        run: |
          docker compose -f .github/docker-compose.test.yml up -d --wait -t 90
        env:
          FRONTEND_TEST_LICENSE: ${{ secrets.FRONTEND_TEST_LICENSE }}
      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          env: AUTH_USER=admin,AUTH_PASSWORD=unleash4all
          config: baseUrl=http://localhost:3000
          spec: cypress/${{ matrix.test }}
          install: false
      - name: Set artifact name
        if: always()
        id: artifact-name
        run: echo "name=cypress-artifacts-$(echo '${{ matrix.test }}' | tr '/' '-')" >> $GITHUB_OUTPUT
      - name: Upload Cypress artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: |
            frontend/cypress/screenshots
            frontend/cypress/videos
          if-no-files-found: ignore
          retention-days: 3
