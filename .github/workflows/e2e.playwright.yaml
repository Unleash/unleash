name: e2e:playwright
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright system dependencies
        run: pnpm --dir frontend exec playwright install-deps chromium
      - name: Install Playwright browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: pnpm --dir frontend exec playwright install chromium
      - name: Start backend services
        run: docker compose -f .github/docker-compose.test.yml up -d db unleash
        env:
          FRONTEND_TEST_LICENSE: ${{ secrets.FRONTEND_TEST_LICENSE }}
      - name: Cache frontend build
        id: cache-frontend-build
        uses: actions/cache@v5
        with:
          path: frontend/build
          key: frontend-build-${{ runner.os }}-${{ hashFiles('frontend/src/**', 'frontend/public/**', 'frontend/index.html', 'frontend/vite.config.ts', 'frontend/tsconfig.json', 'pnpm-lock.yaml') }}
      - name: Build static frontend
        if: steps.cache-frontend-build.outputs.cache-hit != 'true'
        run: pnpm --dir frontend build
      - name: Start frontend server
        run: docker compose -f .github/docker-compose.test.yml up -d --wait -t 90 frontend
        env:
          FRONTEND_TEST_LICENSE: ${{ secrets.FRONTEND_TEST_LICENSE }}
      - name: Run Playwright
        run: pnpm --dir frontend exec playwright test --project enterprise
        env:
          BASE_URL: http://localhost:3000
      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 3
