name: Gitar Duet

on:
  push:
    branches:
      - 'gitar_*'

jobs:
  gitar-duet:
    if: github.event.head_commit.author.name == 'Gitar'
    runs-on: ubuntu-latest
    name: Gitar Duet
    permissions:
      contents: write # Required to update with Gitar Duet changes

    steps:
      - run: |
          echo '${{ toJSON(github.event) }}'
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: |
          pnpm run biome check --fix --unsafe || true # Run unsafe auto-fixes
          pnpm lint:fix || true # Fix linting issues

      - run: pnpm test:updateSnapshot || true # Update test snapshots

      - run: |
          # Undo deletes for snapshots
          git reset
          git diff --diff-filter=D --name-only HEAD | xargs git checkout HEAD^ --

      - name: Run Gitar Duet Action
        uses: gitarcode/gitar-duet-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
